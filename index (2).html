document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body{ margin:0; background:#c9eef8; }\n  @keyframes pinDrop { 0%{ transform:translate(-50%,-160%); opacity:0 } 60%{ transform:translate(-50%,-92%) } 80%{ transform:translate(-50%,-104%) } 100%{ transform:translate(-50%,-100%); opacity:1 } }\n  @keyframes ringPulse { 0%{ transform:translate(-50%,-50%) scale(.4); opacity:.55 } 100%{ transform:translate(-50%,-50%) scale(1.7); opacity:0 } }\n  @keyframes goldPulse { 0%{ transform:scale(.12); opacity:.95 } 70%{ opacity:.4 } 100%{ transform:scale(1.75); opacity:0 } }\n  path.pulseSel { stroke:#ffffff !important; stroke-width:3 !important; }\n  @keyframes badgePop { 0%{ transform:scale(.4); opacity:0 } 70%{ transform:scale(1.12) } 100%{ transform:scale(1); opacity:1 } }\n  @keyframes panelFadeIn { 0%{ opacity:0; transform:translateY(14px) } 100%{ opacity:1; transform:translateY(0) } }\n  @keyframes mapFadeIn { 0%{ opacity:.15 } 100%{ opacity:1 } }\n  @keyframes dropIn { 0%{ opacity:0; transform:translate(-50%,-160%) } 70%{ transform:translate(-50%,-42%) } 100%{ opacity:1; transform:translate(-50%,-50%) } }\n  @keyframes dropInBig { 0%{ opacity:0; transform:translateY(-120px) scale(.82) } 60%{ opacity:1; transform:translateY(16px) scale(1.04) } 80%{ transform:translateY(-6px) scale(.99) } 100%{ opacity:1; transform:translateY(0) scale(1) } }\n\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n<div style=\"position:fixed; inset:0; display:flex; align-items:center; justify-content:center; box-sizing:border-box; overflow:hidden; font-family:'Nunito',sans-serif;\">\n  <div ref=\"{{ fitRef }}\" style=\"width:1280px; height:722px; flex:none; transform-origin:center center;\">\n  <div data-screen-label=\"In-game — Immersive map\" style=\"position:relative; width:1280px; height:722px; border-radius:24px; overflow:hidden; background:#0e3a47; box-shadow:0 22px 60px rgba(15,61,74,.3);\">\n\n    <!-- ocean (fixed) -->\n    <div style=\"position:absolute; inset:0; background:radial-gradient(130% 100% at 50% 8%, #e3fafd 0%, #a8e9fb 48%, #74dbf7 100%);\"><\u002Fdiv>\n\n    <!-- pan/zoom viewport: SVG re-rasterizes per viewBox -> crisp at any zoom -->\n    <div ref=\"{{ viewRef }}\" style=\"position:absolute; inset:0; overflow:hidden; cursor:grab; touch-action:none; user-select:none; -webkit-user-select:none;\">\n      <div ref=\"{{ blurRef }}\" style=\"position:absolute; inset:0; filter:{{ mapBlur }};\">\n        <div ref=\"{{ mapRef }}\" style=\"position:absolute; inset:0;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- loading state -->\n    <sc-if value=\"{{ loading }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font:600 13px 'Nunito',monospace; color:#2c6675; letter-spacing:.04em;\">loading world map…<\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- top-right controls: volume (mute toggle) + statistics — present on every screen -->\n    <div style=\"position:absolute; right:24px; top:24px; display:flex; align-items:center; gap:10px; z-index:20; animation:{{ startAnim }};\">\n      <sc-if value=\"{{ showRandomCounter }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"height:46px; display:flex; align-items:center; gap:8px; padding:0 16px; border-radius:12px; background:rgba(255,255,255,.95); box-shadow:0 6px 18px rgba(15,61,74,.18); font-family:'Fredoka',sans-serif; line-height:1;\">\n          <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" style=\"flex:none; display:block\"><circle cx=\"12\" cy=\"12\" r=\"11\" fill=\"#12b76a\"><\u002Fcircle><path d=\"M7 12.3l3.2 3.2L17 8.7\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <span style=\"display:flex; align-items:baseline; gap:4px;\"><span style=\"font-weight:600; font-size:18px; color:#0e3a47;\">{{ randScore }}<\u002Fspan><span style=\"font-weight:600; font-size:18px; color:#9db3bb;\">/ {{ randTotal }}<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <button onclick=\"{{ toggleMute }}\" title=\"{{ muteTitle }}\" style=\"width:46px; height:46px; border:none; border-radius:12px; cursor:pointer; background:rgba(255,255,255,.95); box-shadow:0 6px 18px rgba(15,61,74,.18); display:flex; align-items:center; justify-content:center;\">\n        <sc-if value=\"{{ muted }}\" hint-placeholder-val=\"{{ false }}\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0e3a47\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 5 6 9H2v6h4l5 4V5z\"><\u002Fpath><line x1=\"23\" y1=\"9\" x2=\"17\" y2=\"15\"><\u002Fline><line x1=\"17\" y1=\"9\" x2=\"23\" y2=\"15\"><\u002Fline><\u002Fsvg>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ notMuted }}\" hint-placeholder-val=\"{{ true }}\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#0e3a47\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M11 5 6 9H2v6h4l5 4V5z\"><\u002Fpath><path d=\"M15.5 8.5a5 5 0 0 1 0 7\"><\u002Fpath><path d=\"M18.5 5.5a9 9 0 0 1 0 13\"><\u002Fpath><\u002Fsvg>\n        <\u002Fsc-if>\n      <\u002Fbutton>\n      <button onclick=\"{{ openStats }}\" title=\"Statistics\" style=\"width:46px; height:46px; border:none; border-radius:12px; cursor:pointer; background:rgba(255,255,255,.95); box-shadow:0 6px 18px rgba(15,61,74,.18); display:flex; align-items:flex-end; justify-content:center; gap:3px; padding:0 0 13px;\">\n        <span style=\"width:4px; height:9px; border-radius:2px; background:#08c79a;\"><\u002Fspan>\n        <span style=\"width:4px; height:15px; border-radius:2px; background:#009fda;\"><\u002Fspan>\n        <span style=\"width:4px; height:12px; border-radius:2px; background:#ff4a37;\"><\u002Fspan>\n        <span style=\"width:4px; height:18px; border-radius:2px; background:#ffbe0a;\"><\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- persistent logo, top-left corner — appears once a game has started; click returns to home -->\n    <sc-if value=\"{{ started }}\" hint-placeholder-val=\"{{ false }}\">\n      <div onclick=\"{{ onGoHome }}\" title=\"Back to home\" style=\"position:absolute; left:24px; top:24px; display:flex; align-items:center; gap:11px; cursor:pointer; z-index:12; animation:{{ startAnim }}; transition:transform .3s ease, filter .3s ease;\" style-active=\"transform:scale(.93); filter:brightness(.8);\">\n        <div style=\"width:46px; height:46px; border-radius:50%; background:linear-gradient(135deg,#08c79a,#009fda); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 16px rgba(8,159,218,.35);\">\n          <div style=\"width:16px; height:16px; background:#ff4a37; border:2.5px solid #fff; border-radius:50% 50% 50% 0; transform:rotate(45deg);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <span style=\"font:600 34px 'Fredoka',sans-serif; letter-spacing:.01em; color:#0e3a47;\">PinPoint<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- top-left progress: game label + round tiles (morphs Countries→Flags between games) -->\n    <div style=\"position:absolute; right:148px; top:24px; opacity:{{ tilesOpacity }}; transform:translateY({{ tilesY }}); transition:opacity 1.4s ease, transform 1.1s cubic-bezier(.34,1.56,.64,1); display:flex; align-items:center; gap:10px; pointer-events:none; z-index:13;\">\n      <sc-if value=\"{{ isDailyMode }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"{{ tile0.style }}\">{{ tile0.label }}<\u002Fdiv>\n        <div style=\"{{ tile1.style }}\">{{ tile1.label }}<\u002Fdiv>\n        <div style=\"{{ tile2.style }}\">{{ tile2.label }}<\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- (infinite genre selector now lives on the difficulty chooser screen, before play) -->\n\n\n    <!-- game-complete card: drops in center, shows score, Next advances to the Flags game -->\n    <sc-if value=\"{{ gameComplete }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:18; display:flex; flex-direction:column; align-items:center; gap:16px; animation:dropIn .7s cubic-bezier(.2,.9,.3,1.15) both;\">\n        <div style=\"background:rgba(255,255,255,.75); border-radius:18px; padding:26px 54px; box-shadow:0 16px 44px rgba(15,61,74,.3); text-align:center;\">\n          <div style=\"font:600 40px 'Fredoka',sans-serif; line-height:1; color:#0e3a47;\">{{ scoreTitle }}<\u002Fdiv>\n          <div style=\"font:700 13px 'Nunito',sans-serif; letter-spacing:.16em; text-transform:uppercase; color:#5b7a86; margin-top:12px;\">Your score<\u002Fdiv>\n          <div style=\"font:600 52px 'Fredoka',sans-serif; line-height:1; color:#08c79a; margin-top:2px;\">{{ score }}<span style=\"color:#9db3bb; font-size:30px;\">/5<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ onNextGame }}\" style=\"border:none; cursor:pointer; padding:15px 60px; border-radius:14px; background:rgba(14,58,71,.75); font:600 20px 'Fredoka',sans-serif; color:#fff; box-shadow:0 10px 28px rgba(15,61,74,.3);\">Next<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- daily finish screen: tall narrow panel — encouraging message, /15 score, per-question breakdown -->\n    <sc-if value=\"{{ dailyDone }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; z-index:22; display:flex; align-items:center; justify-content:center;\">\n        <div style=\"position:absolute; inset:0; background:rgba(31,143,176,.25); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);\"><\u002Fdiv>\n        <div style=\"position:relative; width:520px; max-height:88%; overflow-y:auto; box-sizing:border-box; background:rgba(255,255,255,.85); border-radius:22px; box-shadow:0 22px 60px rgba(15,61,74,.34); padding:34px 40px; display:flex; flex-direction:column; align-items:center; animation:dropInBig .62s cubic-bezier(.3,1.05,.4,1) both;\">\n          <div style=\"font:700 12px 'Nunito',sans-serif; letter-spacing:.24em; text-transform:uppercase; color:#08c79a;\">Daily complete<\u002Fdiv>\n          <div style=\"font:600 40px 'Fredoka',sans-serif; line-height:1.1; color:#0e3a47; text-align:center; margin-top:8px; text-wrap:balance;\">{{ dailyMessage }}<\u002Fdiv>\n          <div style=\"font:600 76px 'Fredoka',sans-serif; line-height:1; color:#08c79a; margin-top:18px;\">{{ dailyScore }}<span style=\"color:#9db3bb; font-size:40px;\">/15<\u002Fspan><\u002Fdiv>\n          <div style=\"width:100%; height:1px; background:#e3edf0; margin:24px 0 18px;\"><\u002Fdiv>\n          <div style=\"width:100%; display:flex; flex-direction:column; gap:18px;\">\n            <sc-for list=\"{{ dailyRows }}\" as=\"row\" hint-placeholder-count=\"3\">\n              <div style=\"display:flex; align-items:center; gap:14px;\">\n                <div style=\"flex:none;\">\n                  <div style=\"font:700 11px 'Nunito',sans-serif; letter-spacing:.14em; text-transform:uppercase; color:#5b7a86;\">{{ row.game }}<\u002Fdiv>\n                  <div style=\"font:600 20px 'Fredoka',sans-serif; color:#0e3a47; line-height:1.1;\">{{ row.count }}<span style=\"color:#9db3bb; font-size:14px;\">/5<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:8px; margin-left:auto; padding-right:8px;\">\n                  <sc-for list=\"{{ row.items }}\" as=\"item\" hint-placeholder-count=\"5\">\n                    <div style=\"position:relative; width:44px; height:30px;\" title=\"{{ item.name }}\">\n                      {{ item.flagEl }}\n                      <div style=\"{{ item.badgeStyle }}\">{{ item.symbol }}<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <button onclick=\"{{ onGoHome }}\" style=\"margin-top:30px; border:none; cursor:pointer; padding:15px 64px; border-radius:14px; background:#0e3a47; font:600 20px 'Fredoka',sans-serif; color:#fff; box-shadow:0 10px 28px rgba(15,61,74,.3);\">Home<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- game intro: drops in after Play (and after the Flags morph), naming the current game -->\n    <sc-if value=\"{{ showIntro }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); z-index:19; pointer-events:none; animation:dropIn .7s cubic-bezier(.2,.9,.3,1.15) both;\">\n        <div style=\"background:rgba(255,255,255,.82); border-radius:20px; padding:30px 60px; box-shadow:0 18px 48px rgba(15,61,74,.32); text-align:center;\">\n          <div style=\"font:700 12px 'Nunito',sans-serif; letter-spacing:.22em; text-transform:uppercase; color:#08c79a;\">Game {{ introNum }} of 3<\u002Fdiv>\n          <div style=\"font:600 54px 'Fredoka',sans-serif; line-height:1.05; color:#0e3a47; margin-top:8px;\">{{ introTitle }}<\u002Fdiv>\n          <div style=\"font:700 17px 'Nunito',sans-serif; color:#5b7a86; margin-top:8px;\">{{ introSub }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- round indicator: fades in, holds, then fades out (driven by WAAPI in onPlay) -->\n    <div ref=\"{{ roundRef }}\" style=\"position:absolute; left:50%; top:24px; transform:translate(-50%,-8px); opacity:0; background:rgba(255,255,255,.94); padding:12px 32px; border-radius:14px; box-shadow:0 8px 24px rgba(15,61,74,.2); text-align:center; pointer-events:none;\">\n      <div style=\"font:700 11px 'Nunito',sans-serif; letter-spacing:.18em; text-transform:uppercase; color:#08c79a;\">Round<\u002Fdiv>\n      <div style=\"font:600 34px 'Fredoka',sans-serif; color:#0e3a47; line-height:1;\">{{ roundNum }}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- prompt: 80% opacity box; fades in to replace the round indicator. Country name OR flag image -->\n    <div ref=\"{{ countryRef }}\" style=\"position:absolute; left:50%; top:24px; transform:translate(-50%,-8px); opacity:0; background:rgba(14,58,71,.65); padding:14px 32px; border-radius:14px; box-shadow:0 8px 24px rgba(15,61,74,.18); text-align:center; pointer-events:none; max-width:360px; box-sizing:border-box;\">\n      <div style=\"font:700 11px 'Nunito',sans-serif; letter-spacing:.18em; text-transform:uppercase; color:#3fe6c6;\">{{ promptLabel }}<\u002Fdiv>\n      <sc-if value=\"{{ isText }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"font:600 {{ promptSize }} 'Fredoka',sans-serif; color:#fff; line-height:1.12; margin-top:2px; text-wrap:balance;\">{{ promptMain }}<\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ isFlags }}\" hint-placeholder-val=\"{{ false }}\">\n        {{ flagImg }}\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <!-- confirm box: bottom-middle, pops in when a country is picked (guesses-left card + Confirm) -->\n    <sc-if value=\"{{ showConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; left:50%; bottom:28px; transform:translateX(-50%); z-index:15;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:12px; animation:panelFadeIn .5s cubic-bezier(.34,1.7,.5,1) both;\">\n          <div style=\"background:rgba(255,255,255,.65); border-radius:14px; padding:9px 22px; box-shadow:0 8px 24px rgba(15,61,74,.18); text-align:center;\">\n            <div style=\"font:700 11px 'Nunito',sans-serif; letter-spacing:.16em; text-transform:uppercase; color:#5b7a86;\">Guesses left<\u002Fdiv>\n            <div style=\"font:600 26px 'Fredoka',sans-serif; line-height:1; color:#0e3a47; margin-top:2px;\">{{ guessesLeftNum }}<\u002Fdiv>\n          <\u002Fdiv>\n          <button onclick=\"{{ onConfirm }}\" style=\"border:none; cursor:pointer; padding:14px 46px; border-radius:12px; background:rgba(14,58,71,.65); font:600 17px 'Fredoka',sans-serif; color:#fff; box-shadow:0 8px 24px rgba(15,61,74,.2);\">Confirm<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- result banner: right/wrong feedback, bottom-center (aligned with the \"place this country\" box) -->\n    <sc-if value=\"{{ showResult }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; left:50%; top:{{ bannerTop }}; bottom:{{ bannerBottom }}; transform:{{ bannerTransform }}; z-index:16;\">\n        <div style=\"display:flex; flex-direction:column; align-items:center; gap:16px; animation:panelFadeIn .7s ease both;\">\n          <div style=\"background:rgba(255,255,255,{{ bannerBg }}); border-radius:14px; padding:12px 34px; box-shadow:0 8px 24px rgba(15,61,74,.22); text-align:center;\">\n            <div style=\"font:600 30px 'Fredoka',sans-serif; line-height:1; color:{{ resultColor }};\">{{ resultTitle }}<\u002Fdiv>\n            <div style=\"font:700 14px 'Nunito',sans-serif; color:#5b7a86; margin-top:5px;\">{{ resultSub }}<\u002Fdiv>\n          <\u002Fdiv>\n          <sc-if value=\"{{ showNext }}\" hint-placeholder-val=\"{{ false }}\">\n            <button onclick=\"{{ onContinue }}\" style=\"border:none; cursor:pointer; padding:13px 44px; border-radius:12px; font:600 18px 'Fredoka',sans-serif; color:#fff; background:rgba(14,58,71,.65); box-shadow:0 8px 22px rgba(15,61,74,.28); white-space:nowrap;\">{{ nextLabel }}<\u002Fbutton>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- \"begin\" panel: full-screen blue overlay with game title + rectangular play button + date -->\n    <sc-if value=\"{{ showBegin }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"position:absolute; inset:0; background:rgba(31,143,176,.25); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;\">\n        <!-- temporary logo + wordmark -->\n        <div style=\"display:flex; align-items:center; gap:14px;\">\n          <div style=\"width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg,#08c79a,#009fda); display:flex; align-items:center; justify-content:center; box-shadow:0 8px 22px rgba(15,61,74,.28);\">\n            <div style=\"width:19px; height:19px; background:#ff4a37; border:3px solid #fff; border-radius:50% 50% 50% 0; transform:rotate(45deg);\"><\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font:600 52px 'Fredoka',sans-serif; letter-spacing:.01em; color:#000000;\">PinPoint<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:18px;\">\n          <button onclick=\"{{ onPlay }}\" style=\"border:none; cursor:pointer; width:210px; padding:16px 0; border-radius:12px; background:rgba(14,20,26,.45); font:600 22px 'Fredoka',sans-serif; color:#fff; letter-spacing:.04em; box-shadow:0 10px 30px rgba(6,20,26,.25); transition:transform .3s ease, filter .3s ease;\" style-active=\"transform:scale(.94); filter:brightness(.8);\">Daily<\u002Fbutton>\n          <button onclick=\"{{ onPlayInfinite }}\" style=\"border:none; cursor:pointer; width:210px; padding:16px 0; border-radius:12px; background:rgba(14,20,26,.45); font:600 22px 'Fredoka',sans-serif; color:#fff; letter-spacing:.04em; box-shadow:0 10px 30px rgba(6,20,26,.25); transition:transform .3s ease, filter .3s ease;\" style-active=\"transform:scale(.94); filter:brightness(.8);\">Infinite<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"font:600 18px 'Fredoka',sans-serif; color:#0e3a47; letter-spacing:.01em;\">{{ todayLabel }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- difficulty chooser: shown after Infinite is clicked, before play begins -->\n    <sc-if value=\"{{ chooseDiff }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"position:absolute; inset:0; background:rgba(31,143,176,.25); z-index:21; animation:panelFadeIn .5s cubic-bezier(.34,1.7,.5,1);\">\n        <div style=\"position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;\">\n          <div style=\"font:600 46px 'Fredoka',sans-serif; color:#0e3a47;\">Game<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:14px; margin-top:2px;\">\n            <div onclick=\"{{ onSelectCountries }}\" style=\"{{ selCountriesStyle }}\" style-active=\"transform:scale(.92); filter:brightness(.85);\">Countries<\u002Fdiv>\n            <div onclick=\"{{ onSelectFlags }}\" style=\"{{ selFlagsStyle }}\" style-active=\"transform:scale(.92); filter:brightness(.85);\">Flags<\u002Fdiv>\n            <div onclick=\"{{ onSelectCapitals }}\" style=\"{{ selCapitalsStyle }}\" style-active=\"transform:scale(.92); filter:brightness(.85);\">Capitals<\u002Fdiv>\n            <div onclick=\"{{ onToggleShuffle }}\" title=\"Shuffle genres\" style=\"{{ shuffleStyle }}\" style-active=\"transform:scale(.92); filter:brightness(.85);\">\n              <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><polyline points=\"16 3 21 3 21 8\"><\u002Fpolyline><line x1=\"4\" y1=\"20\" x2=\"21\" y2=\"3\"><\u002Fline><polyline points=\"21 16 21 21 16 21\"><\u002Fpolyline><line x1=\"15\" y1=\"15\" x2=\"21\" y2=\"21\"><\u002Fline><line x1=\"4\" y1=\"4\" x2=\"9\" y2=\"9\"><\u002Fline><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font:600 46px 'Fredoka',sans-serif; color:#0e3a47; margin-top:16px;\">Difficulty<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:14px; margin-top:2px;\">\n            <div onclick=\"{{ onDiffEasy }}\" style=\"{{ diffEasyStyle }}\" style-active=\"transform:scale(.92); filter:brightness(.85);\">Easy<\u002Fdiv>\n            <div onclick=\"{{ onDiffMedium }}\" style=\"{{ diffMediumStyle }}\" style-active=\"transform:scale(.92); filter:brightness(.85);\">Medium<\u002Fdiv>\n            <div onclick=\"{{ onDiffHard }}\" style=\"{{ diffHardStyle }}\" style-active=\"transform:scale(.92); filter:brightness(.85);\">Hard<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <sc-if value=\"{{ canConfirm }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"position:absolute; left:0; right:0; bottom:36px; display:flex; justify-content:center;\">\n            <button onclick=\"{{ onConfirmInfinite }}\" style=\"border:none; cursor:pointer; padding:16px 72px; border-radius:13px; background:#0e3a47; font:600 22px 'Fredoka',sans-serif; color:#fff; box-shadow:0 10px 30px rgba(6,20,26,.3); animation:panelFadeIn .4s cubic-bezier(.34,1.7,.5,1); transition:transform .3s ease, filter .3s ease;\" style-active=\"transform:scale(.94); filter:brightness(.8);\">Confirm<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:722}}\">\nclass Component extends DCLogic {\n  state = { ready: false, loading: true, vx: 0, vy: 0, scale: 1, began: false, phase: 'idle', muted: false, round: 0, guessName: null, revealing: false, showContinue: false, showMini: false, result: null, attempt: 0, finalFail: false, score: 0, gameComplete: false, intro: null, game: 'countries', mode: 'daily', infTotal: 0, infLast: null, infShuffle: false, difficulty: 'medium', chooseDiff: false, pickedGame: false, pickedDiff: false, dailyDone: false };\n\n  MAX_ATTEMPTS = 3;\n\n  // difficulty tiers by how well-known a country is (cumulative: Easy⊂Medium⊂Hard).\n  EASY_SET = new Set(['United States of America','United Kingdom','France','Germany','Italy','Spain','Portugal','Ireland','Netherlands','Belgium','Switzerland','Austria','Sweden','Norway','Denmark','Finland','Greece','Poland','Russia','Ukraine','China','Japan','South Korea','North Korea','India','Pakistan','Thailand','Vietnam','Indonesia','Philippines','Canada','Mexico','Brazil','Argentina','Chile','Colombia','Peru','Australia','New Zealand','Egypt','South Africa','Nigeria','Kenya','Morocco','Turkey','Saudi Arabia','Iran','Iraq','Israel','United Arab Emirates','Cuba','Jamaica']);\n  // Hard = obscure/small/less-famous states; anything not Easy and not Hard is Medium.\n  HARD_SET = new Set(['Vatican','Monaco','San Marino','Liechtenstein','Andorra','Malta','Nauru','Tuvalu','Kiribati','Palau','Marshall Is.','Micronesia','Tonga','Samoa','Vanuatu','Solomon Is.','Comoros','Seychelles','São Tomé and Principe','Cabo Verde','Dominica','St. Kitts and Nevis','St. Vin. and Gren.','Grenada','Antigua and Barb.','Barbados','Saint Lucia','Brunei','Bhutan','Timor-Leste','Eritrea','Djibouti','Eq. Guinea','Gabon','Congo','Central African Rep.','Chad','Niger','Mauritania','Burkina Faso','Guinea','Guinea-Bissau','Sierra Leone','Liberia','Togo','Benin','Gambia','Lesotho','eSwatini','Malawi','Burundi','Rwanda','S. Sudan','Suriname','Guyana','Belize','Moldova','Montenegro','Macedonia','Bosnia and Herz.','Kyrgyzstan','Tajikistan','Turkmenistan','Laos','Palestine','Yemen','Oman','Bahrain','Qatar','Armenia','Azerbaijan']);\n  tierOf(match){ return this.HARD_SET.has(match) ? 'hard' : (this.EASY_SET.has(match) ? 'easy' : 'medium'); }\n  difficultyPool(){\n    const pool = (this.POOL && this.POOL.length) ? this.POOL : [];\n    const d = this.state.difficulty || 'medium';\n    if (d === 'easy')   return pool.filter(c => this.tierOf(c.match) === 'easy');\n    if (d === 'medium') return pool.filter(c => this.tierOf(c.match) !== 'hard'); // easy + medium\n    return pool; // hard = everything\n  }\n\n  // temporary fixed answer sets (5 daily rounds each). `match` = name as it appears in the map data.\n  ROUNDS_COUNTRIES = [\n    { name: 'Uzbekistan',  match: 'Uzbekistan' },\n    { name: 'Philippines', match: 'Philippines' },\n    { name: 'Brazil',      match: 'Brazil' },\n    { name: 'England',     match: 'United Kingdom' },\n    { name: 'Spain',       match: 'Spain' },\n  ];\n  ROUNDS_FLAGS = [\n    { name: 'Canada',    match: 'Canada',    code: 'ca' },\n    { name: 'Australia', match: 'Australia', code: 'au' },\n    { name: 'Germany',   match: 'Germany',   code: 'de' },\n    { name: 'Italy',     match: 'Italy',     code: 'it' },\n    { name: 'Egypt',     match: 'Egypt',     code: 'eg' },\n  ];\n  // wider flag pool for Infinite mode (match = name in map data; code = flagcdn ISO)\n  INF_FLAGS = [\n    { name: 'Canada',    match: 'Canada',                   code: 'ca' },\n    { name: 'Australia', match: 'Australia',                code: 'au' },\n    { name: 'Germany',   match: 'Germany',                  code: 'de' },\n    { name: 'Italy',     match: 'Italy',                    code: 'it' },\n    { name: 'Egypt',     match: 'Egypt',                    code: 'eg' },\n    { name: 'France',    match: 'France',                   code: 'fr' },\n    { name: 'Japan',     match: 'Japan',                    code: 'jp' },\n    { name: 'Brazil',    match: 'Brazil',                   code: 'br' },\n    { name: 'Spain',     match: 'Spain',                    code: 'es' },\n    { name: 'India',     match: 'India',                    code: 'in' },\n    { name: 'Argentina', match: 'Argentina',                code: 'ar' },\n    { name: 'Mexico',    match: 'Mexico',                   code: 'mx' },\n    { name: 'China',     match: 'China',                    code: 'cn' },\n    { name: 'Kenya',     match: 'Kenya',                    code: 'ke' },\n    { name: 'Norway',    match: 'Norway',                   code: 'no' },\n    { name: 'Turkey',    match: 'Turkey',                   code: 'tr' },\n    { name: 'Thailand',  match: 'Thailand',                 code: 'th' },\n    { name: 'Peru',      match: 'Peru',                     code: 'pe' },\n    { name: 'USA',       match: 'United States of America', code: 'us' },\n    { name: 'Russia',    match: 'Russia',                   code: 'ru' },\n  ];\n  // pool of capitals (country `match` = name in the map data; lon/lat = the capital's exact location)\n  CAPITALS_POOL = [\n    { name: 'France',    match: 'France',                     capital: 'Paris',        lon: 2.3522,   lat: 48.8566 },\n    { name: 'Japan',     match: 'Japan',                      capital: 'Tokyo',        lon: 139.6503, lat: 35.6762 },\n    { name: 'Australia', match: 'Australia',                  capital: 'Canberra',     lon: 149.1300, lat: -35.2809 },\n    { name: 'Canada',    match: 'Canada',                     capital: 'Ottawa',       lon: -75.6972, lat: 45.4215 },\n    { name: 'Brazil',    match: 'Brazil',                     capital: 'Brasília',     lon: -47.8828, lat: -15.7939 },\n    { name: 'Egypt',     match: 'Egypt',                      capital: 'Cairo',        lon: 31.2357,  lat: 30.0444 },\n    { name: 'India',     match: 'India',                      capital: 'New Delhi',    lon: 77.2090,  lat: 28.6139 },\n    { name: 'Argentina', match: 'Argentina',                  capital: 'Buenos Aires', lon: -58.3816, lat: -34.6037 },\n    { name: 'Russia',    match: 'Russia',                     capital: 'Moscow',       lon: 37.6173,  lat: 55.7558 },\n    { name: 'Mexico',    match: 'Mexico',                     capital: 'Mexico City',  lon: -99.1332, lat: 19.4326 },\n    { name: 'Italy',     match: 'Italy',                      capital: 'Rome',         lon: 12.4964,  lat: 41.9028 },\n    { name: 'Spain',     match: 'Spain',                      capital: 'Madrid',       lon: -3.7038,  lat: 40.4168 },\n    { name: 'Germany',   match: 'Germany',                    capital: 'Berlin',       lon: 13.4050,  lat: 52.5200 },\n    { name: 'China',     match: 'China',                      capital: 'Beijing',      lon: 116.4074, lat: 39.9042 },\n    { name: 'USA',       match: 'United States of America',   capital: 'Washington, D.C.', lon: -77.0369, lat: 38.9072 },\n    { name: 'Peru',      match: 'Peru',                       capital: 'Lima',         lon: -77.0428, lat: -12.0464 },\n    { name: 'Kenya',     match: 'Kenya',                      capital: 'Nairobi',      lon: 36.8219,  lat: -1.2921 },\n    { name: 'Thailand',  match: 'Thailand',                   capital: 'Bangkok',      lon: 100.5018, lat: 13.7563 },\n    { name: 'Turkey',    match: 'Turkey',                     capital: 'Ankara',       lon: 32.8597,  lat: 39.9334 },\n    { name: 'Norway',    match: 'Norway',                     capital: 'Oslo',         lon: 10.7522,  lat: 59.9139 },\n  ];\n  // curated real-country pool for Infinite mode (names validated against the map data at pick time)\n  INF_COUNTRIES = ['United States of America','Canada','Mexico','Brazil','Argentina','Peru','Chile','Colombia','Venezuela','United Kingdom','France','Spain','Germany','Italy','Norway','Sweden','Poland','Ukraine','Greece','Portugal','Ireland','Egypt','Nigeria','Kenya','South Africa','Morocco','Algeria','Ethiopia','Russia','China','India','Japan','Indonesia','Thailand','Vietnam','Philippines','Uzbekistan','Kazakhstan','Turkey','Iran','Saudi Arabia','Iraq','Australia','New Zealand','Mongolia','Pakistan','Afghanistan'];\n  capitalsRounds = null; // legacy — daily now uses dailyRounds from the master pool\n  dailyRounds = null;    // 5 questions picked from the 196-country pool at each daily game start\n  // pick 5 random countries from the master pool (falls back to the fixed test set before data loads)\n  // deterministic per-day seed (YYYYMMDD) so everyone gets the same daily questions\n  daySeed(){ const d = new Date(); return d.getFullYear() * 10000 + (d.getMonth() + 1) * 100 + d.getDate(); }\n  // mulberry32 seeded PRNG -> returns a function giving stable pseudo-random [0,1)\n  seededRng(seed){\n    let a = seed >>> 0;\n    return () => { a |= 0; a = (a + 0x6D2B79F5) | 0; let t = Math.imul(a ^ (a >>> 15), 1 | a); t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t; return ((t ^ (t >>> 14)) >>> 0) / 4294967296; };\n  }\n  pickDaily(){\n    // (re)build only from the real 195-country pool; never cache the temporary fallback set\n    if (!this.dailySets || this.dailySetsDay !== this.daySeed()) this.buildDailySets();\n    this.dailyRounds = (this.dailySets && this.dailySets[this.state.game]) || [];\n  }\n  // build all 15 daily questions at once (5 per game) sharing one exclusion set so no country\n  // repeats across Countries / Flags / Capitals, and stable for the whole day for everyone.\n  buildDailySets(){\n    const pool = (this.POOL && this.POOL.length) ? this.POOL.slice() : null;\n    if (!pool){ // real pool not loaded yet — use temp set for this run, don't cache\n      this.dailySets = { countries: this.ROUNDS_COUNTRIES.slice(0,5), flags: this.ROUNDS_COUNTRIES.slice(0,5), capitals: this.ROUNDS_COUNTRIES.slice(0,5) };\n      this.dailySetsDay = null;\n      return;\n    }\n    const easy = pool.filter(c => this.tierOf(c.match) === 'easy');\n    const medium = pool.filter(c => this.tierOf(c.match) === 'medium');\n    const hard = pool.filter(c => this.tierOf(c.match) === 'hard');\n    const rnd = this.seededRng(this.daySeed());\n    const used = new Set();\n    const pick = (tier) => {\n      const arr = tier === 'easy' ? easy : (tier === 'medium' ? medium : hard);\n      const avail = arr.filter(c => !used.has(c.match));\n      const src = avail.length ? avail : pool.filter(c => !used.has(c.match));\n      const c = (src.length ? src : pool)[Math.floor(rnd() * (src.length ? src.length : pool.length))] || pool[0];\n      if (c) used.add(c.match);\n      return c;\n    };\n    const chance = (p, a, b) => pick(rnd() < p ? a : b);\n    // R1 easy · R2 75% easy/25% medium · R3 medium · R4 75% medium/25% hard · R5 hard\n    const makeGame = () => [pick('easy'), chance(0.75, 'easy', 'medium'), pick('medium'), chance(0.75, 'medium', 'hard'), pick('hard')];\n    this.dailySets = { countries: makeGame(), flags: makeGame(), capitals: makeGame() };\n    this.dailySetsDay = this.daySeed();\n  }\n  pickCapitals(){ this.pickDaily(); } // kept for existing callers\n  rounds(){\n    if (this.state.mode === 'infinite') return (this.POOL && this.POOL.length) ? this.POOL : this.ROUNDS_COUNTRIES;\n    if (!this.dailyRounds || !this.dailyRounds.length) this.pickDaily();\n    return this.dailyRounds;\n  }\n\n  constructor(props){\n    super(props);\n    // Mercator (big-Greenland look). Board height = exactly the chosen latitude band so there is\n    // no wasted ocean above Greenland or below the southern landmasses.\n    this.W = 1280;\n    this.NORTH = 79;   // through most of Greenland (keeps it large); trims only its far tip for a wider board\n    this.SOUTH = -56;  // through Tierra del Fuego / southern New Zealand\n    const M = d => Math.log(Math.tan(Math.PI / 4 + (d * Math.PI / 180) / 2));\n    this.H = Math.round((this.W / (2 * Math.PI)) * (M(this.NORTH) - M(this.SOUTH)));\n    this.mapRef = React.createRef();\n    this.viewRef = React.createRef();\n    this.fitRef = React.createRef();\n    this.blurRef = React.createRef();\n    this.roundRef = React.createRef();\n    this.countryRef = React.createRef();\n    this.miniRef = React.createRef();\n    this.miniImgRef = React.createRef();\n    this.miniGuessRef = React.createRef();\n    this.miniCorrectRef = React.createRef();\n    this.miniLabelRef = React.createRef();\n    this.topARef = React.createRef();\n    this.topBRef = React.createRef();\n    this.topAText = React.createRef();\n    this.topBText = React.createRef();\n    this.topCRef = React.createRef();\n    this.topCText = React.createRef();\n    this.svgEl = null;\n  }\n\n  // scale the 1280x760 board down to fit the viewport so nothing clips\n  fitToViewport(){\n    const el = this.fitRef.current;\n    if (!el) return;\n    // fit the whole board within the viewport (contain) so all UI stays visible; scale up to fill\n    const k = Math.min(window.innerWidth / this.W, window.innerHeight / this.H);\n    el.style.transform = 'scale(' + k + ')';\n  }\n\n  loadScript(src){\n    return new Promise((resolve, reject) => {\n      const existing = [...document.scripts].find(s => s.src === src);\n      if (existing){ if (existing.dataset.loaded) return resolve(); existing.addEventListener('load', () => resolve()); return; }\n      const s = document.createElement('script');\n      s.src = src; s.async = true;\n      s.addEventListener('load', () => { s.dataset.loaded = \"1\"; resolve(); });\n      s.addEventListener('error', reject);\n      document.head.appendChild(s);\n    });\n  }\n\n  // synthesized mechanical keyboard key-press, played on each new country hover.\n  // Built from two broadband noise transients: the actuation \"tick\" + the bottom-out \"clack\".\n  playClick(){\n    try {\n      if (!this.audioCtx){\n        const AC = window.AudioContext || window.webkitAudioContext;\n        if (!AC) return;\n        this.audioCtx = new AC();\n      }\n      const ctx = this.audioCtx;\n      if (ctx.state === 'suspended') ctx.resume();\n      const now = ctx.currentTime;\n\n      // one short noise burst shaped by a filter + gain envelope\n      const tick = (t, { dur, peak, type, freq, q, decay }) => {\n        const len = Math.max(1, Math.floor(ctx.sampleRate * dur));\n        const buf = ctx.createBuffer(1, len, ctx.sampleRate);\n        const d = buf.getChannelData(0);\n        for (let i = 0; i < len; i++){ d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.4); }\n        const src = ctx.createBufferSource(); src.buffer = buf;\n        const f = ctx.createBiquadFilter(); f.type = type; f.frequency.value = freq; if (q != null) f.Q.value = q;\n        const g = ctx.createGain();\n        g.gain.setValueAtTime(0.0001, t);\n        g.gain.exponentialRampToValueAtTime(peak, t + 0.0008);\n        g.gain.exponentialRampToValueAtTime(0.0008, t + decay);\n        src.connect(f); f.connect(g); g.connect(ctx.destination);\n        src.start(t); src.stop(t + dur);\n      };\n\n      // actuation: short, now darker\n      tick(now,         { dur: 0.014, peak: 0.24, type: 'lowpass', freq: 1100, decay: 0.014 });\n      // bottom-out clack ~9ms later: deep, fuller body\n      tick(now + 0.009, { dur: 0.045, peak: 0.46, type: 'bandpass', freq: 480, q: 0.7, decay: 0.04 });\n    } catch (e) { /* ignore */ }\n  }\n\n  // clone the country's outline and expand it outward, fading — a ripple on select\n  expandRipple(p, color){\n    try {\n      const ghost = p.cloneNode(false);\n      ghost.removeAttribute('class');\n      ghost.removeAttribute('data-name'); // don't shadow the real country in pathByName lookups\n      ghost.dataset.selected = '';\n      ghost.setAttribute('fill', 'none');\n      ghost.setAttribute('stroke', color);\n      ghost.setAttribute('stroke-width', '2.5');\n      ghost.setAttribute('vector-effect', 'non-scaling-stroke');\n      ghost.style.pointerEvents = 'none';\n      ghost.style.transformBox = 'fill-box';\n      ghost.style.transformOrigin = 'center';\n      ghost.style.filter = 'drop-shadow(0 0 4px ' + color + ')';\n      p.parentNode.appendChild(ghost); // draw above siblings\n      const anim = ghost.animate(\n        [\n          { transform: 'scale(1)',    opacity: 0.9 },\n          { transform: 'scale(1.9)',  opacity: 0 }\n        ],\n        { duration: 600, easing: 'cubic-bezier(.25,.8,.3,1)' }\n      );\n      anim.onfinish = () => ghost.remove();\n      anim.oncancel = () => ghost.remove();\n      setTimeout(() => { if (ghost.parentNode) ghost.remove(); }, 800); // fallback cleanup\n    } catch (e) { /* ignore */ }\n  }\n\n  // viewBox dimensions for a given zoom scale\n  vw(){ return this.W / this.state.scale; }\n  vh(){ return this.H / this.state.scale; }\n\n  applyViewBox(){\n    if (this.svgEl) this.svgEl.setAttribute('viewBox', `${this.state.vx} ${this.state.vy} ${this.vw()} ${this.vh()}`);\n    this.repositionLabels();\n  }\n\n  // keep pinned name labels aligned to their country as the map pans/zooms (with edge-clamping)\n  repositionLabels(){\n    if (!this.mapLabels) return;\n    for (const item of this.mapLabels){\n      if (!item.cen) continue;\n      this.positionLabel(item);\n    }\n    // keep active gold pulse rings pinned to their country while panning/zooming\n    if (this.goldRings){\n      for (const g of this.goldRings){\n        g.el.style.left = ((g.cen[0] - this.state.vx) * this.state.scale) + 'px';\n        g.el.style.top = ((g.cen[1] - this.state.vy) * this.state.scale) + 'px';\n      }\n    }\n  }\n\n  // place a label at its anchor, nudging it horizontally so the pill never leaves the frame\n  positionLabel(item){\n    const MARGIN = 12;\n    const el = item.el || item, cen = item.cen, pill = item.pill;\n    const x = (cen[0] - this.state.vx) * this.state.scale;\n    const y = (cen[1] - this.state.vy) * this.state.scale + (item.dy || 0);\n    el.style.top = y + 'px';\n    if (!pill){ el.style.left = x + 'px'; return; }\n    const half = pill.offsetWidth / 2;\n    if (item.fixed){\n      // dot must stay exactly on the point — keep container fixed, shift only the floating pill\n      el.style.left = x + 'px';\n      let shift = 0;\n      const le = x - half, re = x + half;\n      if (le < MARGIN) shift = MARGIN - le;\n      else if (re > this.W - MARGIN) shift = (this.W - MARGIN) - re;\n      pill.style.transform = 'translateX(calc(-50% + ' + shift + 'px))';\n    } else {\n      // whole label can move — clamp its center so the pill stays fully in frame\n      const minL = MARGIN + half, maxL = this.W - MARGIN - half;\n      el.style.left = Math.max(minL, Math.min(maxL, x)) + 'px';\n    }\n  }\n\n  clamp(vx, vy, scale){\n    const vw = this.W / scale, vh = this.H / scale;\n    return [ Math.min(this.W - vw, Math.max(0, vx)), Math.min(this.H - vh, Math.max(0, vy)) ];\n  }\n\n  // displayed px -> design px (DC may be scaled to fit preview)\n  factors(){\n    const r = this.viewRef.current.getBoundingClientRect();\n    return { r, fx: this.W / r.width, fy: this.H / r.height };\n  }\n\n  zoomAt(nextScale, cx, cy){\n    // cx,c d fill (no glow / no pulse)\n  highlightGold(name){\n    const list = (this.pathsByName && this.pathsByName[name]) || [];\n    list.forEach(p => {\n      if (p.getAttribute('data-overseas') === '1') return; // skip overseas territories (e.g. French Guiana)\n      p.dataset.reveal = '1';\n      p.setAttribute('fill', '#ffd21a');\n      p.setAttribute('stroke', '#e0a400');\n      p.setAttribute('stroke-width', '2');\n      p.style.filter = 'none';\n      p.parentNode.appendChild(p); // raise\n    });\n  }\n\n  // start a golden ping at a country's location that REPLAYS every 3s (used on wrong-answer reveals)\n  startGoldPulse(name){\n    this.stopGoldPulse();\n    this._goldPulseName = name;\n    this.pulseGoldRing(name);\n    this._goldPulseTimer = setInterval(() => this.pulseGoldRing(name), 3000);\n  }\n  stopGoldPulse(){\n    if (this._goldPulseTimer){ clearInterval(this._goldPulseTimer); this._goldPulseTimer = null; }\n    this._goldPulseName = null;\n    this.goldRings = [];\n    if (this.viewRef.current) this.viewRef.current.querySelectorAll('div[data-gold-ring]').forEach(r => r.remove());\n  }\n\n  // expanding golden ring(s) flowing outward from a country's location, then fading out\n  pulseGoldRing(name){\n    const host = this.viewRef.current;\n    const cen = this.centroidByName && this.centroidByName[name];\n    if (!host || !cen) return;\n    const x = (cen[0] - this.state.vx) * this.state.scale;\n    const y = (cen[1] - this.state.vy) * this.state.scale;\n    for (let k = 0; k < 3; k++){\n      const ring = document.createElement('div');\n      ring.setAttribute('data-gold-ring', '1');\n      ring.style.cssText = 'position:absolute; left:' + x + 'px; top:' + y + 'px; width:96px; height:96px; margin:-48px 0 0 -48px; border-radius:50%; border:4px solid #ffd21a; box-shadow:0 0 14px rgba(255,210,26,.75), inset 0 0 8px rgba(255,210,26,.45); pointer-events:none; z-index:9; opacity:0; animation:goldPulse 1.5s ease-out ' + (k * 0.32) + 's forwards;';\n      host ess;\n    // visibility is driven by state.showMini (survives re-render); layout above is imperative\n  }\n\n  // pin a name label at a country's centroid on the map (color-coded, with a ✓/✗ marker)\n  pinLabel(name, kind){\n    if (this.state.game === 'capitals') return; // capitals mode shows only the capital pin, not the country name\n    const host = this.viewRef.current;\n    const cen = this.centroidByName && this.centroidByName[name];\n    if (!host || !cen) return;\n    const x = (cen[0] - this.state.vx) * this.state.scale;\n    const y = (cen[1] - this.state.vy) * this.state.scale;\n    const color = kind === 'correct' ? '#0f8f52' : '#c62b1b';\n    const mark = kind === 'correct'\n      ? '<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"11\" fill=\"#12b76a\"/><path d=\"M7 12.3l3.2 3.2L17 8.7\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>'\n      : '<svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" style=\"flex:none\"><circle cx=\"12\" cy=\"12\" r=\"11\" fill=\"#f0402f\"/><path d=\"M8.5 8.5l7 7M15.5 8.5l-7 7\" stroke=\"#fff\" stroke-width=\"2.6\" stroke-linecap=\"round\"/><\u002Fsvg>';\n    const el = document.createElement('div');\n    el.setAttribute('data-map-label', '1');\n    el.style.cssText = 'position:absolute; left:' + x + 'px; top:' + y + 'px; transform:translate(-50%,-50%); pointer-events:none; z-index:6;';\n    el.innerHTML = '<div style=\"display:flex; align-items:center; gap:7px; padding:6px 12px; border-radius:999px; background:rgba(255,255,255,.95); box-shadow:0 4px 14px rgba(15,61,74,.3); font:600 16px Fredoka,sans-serif; color:' + color + '; white-space:nowrap; animation:badgePop .45s cubic-bezier(.34,1.7,.5,1) both;\">' + mark + '<span>' + name + '<\u002Fspan><\u002Fdiv>';\n    host.appendChild(el);\n    // in capitals mode, drop the country name below the centroid so it clears the capital pill above the dot\n    const item = { el, cen, pill: el, fixed: false, dy: this.state.game === 'capitals' ? 30 : 0 };\n    (this.mapLabels = this.mapLabels || []).push(item);\n    this.positionLabel(item);\n  }\n\n  // pin a precise dot + capital name at the capital's exact lon/lat (repositions on pan/zoom like labels)\n  pinCapital(round, kind){\n    const host = this.viewRef.current;\n    if (!host || !this.projectLL || !round || round.lon == null) return;\n    const cen = this.projectLL(round.lon, round.lat);\n    const x = (cen[0] - this.state.vx) * this.state.scale;\n    const y = (cen[1] - this.state.vy) * this.state.scale;\n    const dotColor = kind === 'correct' ? '#c8161d' : '#0e3a47';\n    // zero-size container centered EXACTLY on the capital point; dot centered on it, name floats above\n    const el = document.createElement('div');\n    el.setAttribute('data-map-label', '1');\n    el.style.cssText = 'position:absolute; left:' + x + 'px; top:' + y + 'px; width:0; height:0; transform:translate(-50%,-50%); pointer-events:none; z-index:7;';\n    el.innerHTML =\n      '<div class=\"capname\" style=\"position:absolute; left:0; bottom:16px; transform:translateX(-50%);\"><div style=\"background:rgba(255,255,255,.96); box-shadow:0 4px 14px rgba(15,61,74,.3); padding:4px 12px; border-radius:999px; font:600 15px Fredoka,sans-serif; color:#0e3a47; white-space:nowrap; animation:badgePop .45s cubic-bezier(.34,1.7,.5,1) both;\">' + (round.capital || '') + '<\u002Fdiv><\u002Fdiv>' +\n      '<div style=\"position:absolute; left:0; top:0; transform:translate(-50%,-50%);\"><div style=\"width:15px; height:15px; border-radius:50%; background:' + dotColor + '; border:3px solid #fff; box-shadow:0 2px 7px rgba(0,0,0,.45); animation:badgePop .45s cubic-bezier(.34,1.7,.5,1) both;\"><\u002Fdiv><\u002Fdiv>';\n    host.appendChild(el);\n    // dot stays exactly on the point; the name pill (fixed:true) is shifted to stay in frame\n    const item = { el, cen, pill: el.querySelector('.capname'), fixed: true };\n    (this.mapLabels = this.mapLabels || []).push(item);\n    this.positionLabel(item);\n  }\n\n  clearMapLabels(){\n    if (this.mapLabels) this.mapLabels.forEach(item => (item.el || item).remove());\n    this.mapLabels = [];\n  }\n\n  clearReveal(){\n    this.stopGoldPulse();\n    if (this.mapRef.current){\n      this.mapRef.current.querySelectorAll('path[data-reveal=\"1\"]').forEach(p => {\n        p.getAnimations().forEach(a => a.cancel()); // stop the gold shimmer\n        p.dataset.reveal = '0'; p.dataset.selected = '0';\n        p.classList.remove('pulseSel');\n        p.setAttribute('fill', '#4ed98a');\n        p.setAttribute('stroke', '#1f9d55');\n        p.setAttribute('stroke-width', '1');\n        p.style.filter = 'none';\n        p.style.transform = '';\n      });\n    }\n    if (this.wrongLabel){ this.wrongLabel.remove(); this.wrongLabel = null; }\n    this.clearMapLabels();\n    this.guessPath = null;\n    this.guessCountry = null;\n  }\n\n  // look up a country's capital record (by map-data match name) from the master pool\n  capitalFor(match){\n    return (this.POOL || this.CAPITALS_POOL || []).find(c => c.match === match) || null;\n  }\n\n  // user pressed Confirm. 3 attempts per round: wrong picks stay red; final fail reveals the answer.\n  confirmGuess(){\n    if (this.state.revealing || this.state.guessName == null) return;\n    const idx = this.state.round;\n    const correct = this.rounds()[idx].match;\n    const guess = this.state.guessName;\n    const ok = (guess === correct);\n    // clear the neon selection on the guessed country (all its landmasses)\n    if (this.guessCountry && this.applyState){\n      (this.pathsByName[this.guessCountry] || []).forEach(q => { q.dataset.selected = '0'; this.applyState(q, false); });\n    }\n\n    if (ok){\n      this.acceptingGuess = false;\n      this.highlightGold(correct);\n      this.pinLabel(correct, 'correct');\n      if (this.state.game === 'capitals') this.pinCapital(this.rounds()[idx], 'correct');\n      const c = this.countryRef.current;\n      if (c) c.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 280, easing: 'ease', fill: 'forwards' });\n      this.logDaily(this.rounds()[idx], true);\n      this.setState({ revealing: true, showContinue: true, result: 'correct', finalFail: false, score: this.state.score + 1, scale: 1, vx: 0, vy: 0 }, () => this.applyViewBox());\n      this.playSuccess();\n      return;\n    }\n\n    // wrong guess — mark the WHOLE country red + pin, and count the attempt\n    const attempt = this.state.attempt + 1;\n    this.playThud();                             // thud on every incorrect guess\n    this.highlightRed(guess);\n    this.pinLabel(guess, 'wrong');\n    // capitals: also show the wrongly-picked country's own capital + exact location\n    if (this.state.game === 'capitals'){\n      const wc = this.capitalFor(guess);\n      if (wc) this.pinCapital(wc, 'wrong');\n    }\n    this.guessPath = null;\n    this.guessCountry = null;\n\n    if (attempt >= this.MAX_ATTEMPTS){\n      // final failed attempt — reveal the answer, show Incorrect + Next Round at the bottom middle\n      this.acceptingGuess = false;\n      this.highlightGold(correct);\n      this.startGoldPulse(correct);              // repeating golden ping on the missed answer\n      this.pinLabel(correct, 'correct');\n      if (this.state.game === 'capitals') this.pinCapital(this.rounds()[idx], 'correct');\n      const c = this.countryRef.current;\n      if (c) c.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 280, easing: 'ease', fill: 'forwards' });\n      this.logDaily(this.rounds()[idx], false);\n      this.setState({ attempt, revealing: true, showContinue: true, result: 'wrong', finalFail: true, guessName: null });\n    } else {\n      // still have guesses left — let them try again (wrong pick stays red)\n      this.setState({ attempt, guessName: null, result: 'retry', finalFail: false });\n    }\n  }\n\n  // record a daily-mode question result for the finish screen (label + genre + correctness)\n  logDaily(q, ok){\n    if (!this.dailyLog) this.dailyLog = [];\n    const label = this.state.game === 'capitals' ? (q.capital || q.name) : q.name;\n    this.dailyLog.push({ game: this.state.game, label, name: q.name, code: q.code, ok });\n  }\n\n  // user pressed Continue: advance immediately (reveal is instant, nothing to wait for)\n  continueRound(){\n    if (!this.state.showContinue) return;\n    this.nextRound();\n  }\n\n  // Next (game-complete): advance to the next game. countries -> flags -> capitals\n  // Top-left tiles are state-driven (see renderVals), so changing state.game morphs them via CSS.\n  nextGame(){\n    const finished = this.state.game;\n    if (finished === 'countries'){\n      this.clearReveal();\n      this.clearMapLabels();\n      this.dailyRounds = null; // fresh 5 for the flags game\n      this.setState({ gameComplete: false, game: 'flags', round: 0, score: 0, attempt: 0,\n        guessName: null, revealing: false, showContinue: false, showMini: false, result: null,\n        scale: 1, vx: 0, vy: 0 }, () => this.applyViewBox());\n      clearTimeout(this._flagsT);\n      this._flagsT = setTimeout(() => this.showGameIntro('flags', () => this.showRound()), 700);\n    } else if (finished === 'flags'){\n      // flags done — morph the top-left into Capital Cities and START that game\n      this.clearReveal();\n      this.clearMapLabels();\n      this.dailyRounds = null; // rebuilt in showRound() after game:'capitals' state commits\n      this.setState({ gameComplete: false, game: 'capitals', round: 0, score: 0, attempt: 0,\n        guessName: null, revealing: false, showContinue: false, showMini: false, result: null,\n        scale: 1, vx: 0, vy: 0 }, () => this.applyViewBox());\n      clearTimeout(this._capsT);\n      this._capsT = setTimeout(() => this.showGameIntro('capitals', () => this.showRound()), 700);\n    } else if (finished === 'capitals'){\n      // all three daily games done — ndow.webkitAudioContext;\n      if (!this._actx) this._actx = new AC();\n      const ctx = this._actx;\n      if (ctx.state === 'suspended') ctx.resume();\n      const t = ctx.currentTime;\n      const filt = ctx.createBiquadFilter();\n      filt.type = 'lowpass';\n      filt.frequency.setValueAtTime(300, t);\n      filt.frequency.exponentialRampToValueAtTime(110, t + 0.12);\n      const g = ctx.createGain();\n      g.gain.setValueAtTime(0.0001, t);\n      g.gain.exponentialRampToValueAtTime(0.16, t + 0.01);\n      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);\n      const o = ctx.createOscillator();\n      o.type = 'sine';\n      o.frequency.setValueAtTime(120, t);\n      o.frequency.exponentialRampToValueAtTime(60, t + 0.14);\n      o.connect(filt); filt.connect(g); g.connect(ctx.destination);\n      o.start(t); o.stop(t + 0.18);\n    } catch (e) {}\n  }\n\n  // soft, warm click for menu/setup button presses (respects mute)\n  playClick(){\n    if (this.state.muted) return;\n    try {\n      const AC = window.AudioContext || window.webkitAudioContext;\n      if (!this._actx) this._actx = new AC();\n      const ctx = this._actx;\n      if (ctx.state === 'suspended') ctx.resume();\n      const t = ctx.currentTime;\n      // two-oscillator \"pock\": a low body + a soft higher harmonic, low-pass filtered for warmth\n      const filt = ctx.createBiquadFilter();\n      filt.type = 'lowpass';\n      filt.frequency.setValueAtTime(420, t);\n      filt.frequency.exponentialRampToValueAtTime(150, t + 0.10);\n      const gain = ctx.createGain();\n      gain.gain.setValueAtTime(0.0001, t);\n      gain.gain.exponentialRampToValueAtTime(0.28, t + 0.012); // gentle attack\n      gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.14); // smooth tail\n      filt.connect(gain); gain.connect(ctx.destination);\n      const mk = (type, f0, f1, level) => {\n        const o = ctx.createOscillator(), g = ctx.createGain();\n        o.type = type;\n        o.frequency.setValueAtTime(f0, t);\n        o.frequency.exponentialRampToValueAtTime(f1, t + 0.09);\n        g.gain.setValueAtTime(level, t);\n        o.connect(g); g.connect(filt);\n        o.start(t); o.stop(t + 0.16);\n      };\n      mk('sine', 72, 42, 1.0);        // deep sub body\n      mk('triangle', 130, 80, 0.28);  // soft low click transient\n    } catch (e) {}\n  }\n\n  async componentDidMount(){\n    // sync the board element heights to the computed Mercator band height\n    if (this.fitRef.current){\n      this.fitRef.current.style.height = this.H + 'px';\n      const card = this.fitRef.current.firstElementChild;\n      if (card) card.style.height = this.H + 'px';\n    }\n    this.fitToViewport();\n    this.setBlur(!this.state.began); // map starts blurred while the \"begin\" panel is up\n    // warm up + unlock the audio context on the first user gesture so sounds play from the first interaction\n    this._ensureAudio = () => {\n      try {\n        const AC = window.AudioContext || window.webkitAudioContext;\n        if (!this._actx) this._actx = new AC();\n        if (this._actx.state === 'suspended') this._actx.resume();\n      } catch (e) {}\n    };\n    ['pointerdown', 'keydown', 'touchstart'].forEach(ev =>\n      window.addEventListener(ev, this._ensureAudio, { capture: true }));\n    this._onResize = () => this.fitToViewport();\n    window.addEventListener('resize', this._onResize);\n    window.addEventListener('orientationchange', this._onResize); // re-fit when phone/iPad rotates\n    const W = this.W, H = this.H, SS = 4; // supersample the internal coordinate space 4x for extra path precision\n    try {\n      await this.loadScript('https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js');\n      await this.loadScript('https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js');\n      const topo = await (await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-10m.json')).json();\n      const land = window.topojson.feature(topo, topo.objects.countries);\n\n      // Mercator, projected into supersampled space, exposed at WxH via viewBox (zoom stays vector-crisp).\n      // Full 360° longitude -> full width; vertical band trimmed exactly to NORTH..SOUTH (no wasted ocean).\n      const projection = d3.geoMercator()\n        .scale((W * SS) / (2 * Math.PI))\n        .translate([ (W * SS) / 2, 0 ]);\n      const yNorth = projection([0, this.NORTH])[1];\n      projection.translate([ (W * SS) / 2, -yNorth ]); // NORTH latitude sits at the very top (y = 0)\n      const path = d3.geoPath(projection);\n      // project a capital's [lon,lat] into board coords (W x H space, matching centroidByName)\n      this.projectLL = (lon, lat) => { const p = projection([lon, lat]); return [ p[0]/SS, p[1]/SS ]; };\n\n      let inner = '';\n      this.centroidByName = {};\n      this.areaByName = {};\n      this.mainPxByName = {};\n      for (const f of land.features){\n        const b = path.bounds(f);\n        const bw = b[1][0]-b[0][0], bh = b[1][1]-b[0][1];\n        if (!isFinite(bw) || !isFinite(bh) || (bw > W*SS*0.94 && bh > H*SS*0.79)) continue; // skip degenerate ring (Maldives in 10m)\n        const nm = (f.properties && f.properties.name || '').replace(/\"/g,'');\n        // split into individual landmass polygons so highlights only cover the clicked landmass\n        const geom = f.geometry;\n        const polys = geom.type === 'Polygon' ? [geom.coordinates]\n          : (geom.type === 'MultiPolygon' ? geom.coordinates : []);\n        // gather this country's polygons, then keep the mainland + drop far-flung small islands\n        let bestCen = null;\n        const recs = [];\n        for (let pi = 0; pi < polys.length; pi++){\n          const pf = { type: 'Feature', geometry: { type: 'Polygon', coordinates: polys[pi] } };\n          const d = path(pf);\n          if (!d) continue;\n          const area = d3.geoArea(pf);\n          this.areaByName[nm] = (this.areaByName[nm] || 0) + area; // total geographic area per co
